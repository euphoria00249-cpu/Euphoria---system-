<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euphoria Elite | Ultra Control</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        :root { --primary: #9d4edd; --bg: #0b0b0f; --card: #16161d; --text: #ffffff; --danger: #ef4444; --success: #4ade80; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: auto; display: none; }
        .card { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid #333; margin-bottom: 15px; }
        input, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid #444; background: #222; color: white; box-sizing: border-box; font-size: 16px; }
        button { background: var(--primary); font-weight: bold; border: none; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        .btn-danger { background: var(--danger); }
        .btn-success { background: var(--success); color: black; }

        /* شاشة الدخول */
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        
        /* عداد الفرز */
        .stats { display: flex; gap: 10px; margin-bottom: 15px; }
        .stat-box { flex: 1; background: #1a1a24; padding: 12px; border-radius: 12px; text-align: center; border: 1px solid #333; }
        .stat-num { display: block; font-size: 22px; font-weight: bold; color: var(--primary); }

        /* نافذة التذكرة */
        #ticket-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; }
        #ticket-design { background: white; color: black; padding: 25px; border-radius: 15px; width: 260px; text-align: center; border: 5px solid #000; }
        
        /* الأرشيف */
        .archive-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
        .archive-table th, .archive-table td { padding: 8px; border: 1px solid #222; text-align: left; }
        .row-in { background: rgba(74, 222, 128, 0.1); }
        .action-btns { display: flex; gap: 5px; }
        .mini-btn { padding: 5px; font-size: 10px; width: auto; margin: 0; }
    </style>
</head>
<body>

<div id="login-screen">
    <div style="text-align: center; width: 80%;">
        <div style="font-size: 50px; margin-bottom: 10px;">💎</div>
        <h2 style="color: var(--primary); letter-spacing: 2px;">EUPHORIA ELITE</h2>
        <input type="password" id="adminPass" placeholder="Enter Password">
        <button onclick="unlock()">UNLOCK SYSTEM</button>
    </div>
</div>

<div id="ticket-modal">
    <div id="ticket-design">
        <h2 style="margin:0; font-weight: 900;">EUPHORIA</h2>
        <p style="margin:0; font-size:10px; letter-spacing:3px;">ELITE ACCESS</p>
        <div id="qrcode" style="display:flex; justify-content:center; margin:15px 0;"></div>
        <div id="ticket-info" style="font-family:monospace; font-size:12px; text-align:left; border-top: 1px solid #ddd; padding-top:10px;"></div>
    </div>
    <button style="width:270px; margin-top:15px; background:var(--success); color:black;" onclick="saveTicket()">📥 SAVE TO GALLERY</button>
    <button style="width:270px; background:#444;" onclick="closeModal()">CLOSE</button>
</div>

<div class="container" id="app">
    <div class="stats">
        <div class="stat-box">Total<span class="stat-num" id="totalCount">0</span></div>
        <div class="stat-box">Inside<span class="stat-num" id="inCount" style="color:var(--success)">0</span></div>
    </div>

    <div class="card">
        <h3>🎫 Issue Ticket</h3>
        <input type="text" id="guest" placeholder="Guest Full Name">
        <button onclick="issue()">CREATE TICKET</button>
    </div>

    <div class="card" style="border-color: var(--success);">
        <h3>🛡️ Check-in Control</h3>
        <div id="reader" style="border-radius:10px; overflow:hidden; background: #000;"></div>
        <input type="text" id="manualID" placeholder="Enter ID Manually (e.g. EUP-XXXXX)" style="margin-top:10px;">
        <button class="btn-success" onclick="verify(document.getElementById('manualID').value)">CONFIRM ENTRY</button>
        <div id="msg" style="text-align:center; padding:10px; font-weight:bold; min-height: 40px;"></div>
    </div>

    <div class="card">
        <h3>📋 Ticket Archive & Registry</h3>
        <div style="max-height: 400px; overflow-y: auto;">
            <table class="archive-table">
                <thead>
                    <tr><th>Name</th><th>Status</th><th>Actions</th></tr>
                </thead>
                <tbody id="archiveBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
// بيانات Firebase
const firebaseConfig = {
    apiKey: "AIzaSyDbla1Ok8aSs2IUUeB6v-2tRriNPWmYTvE",
    authDomain: "euphoria-tickets-480c5.firebaseapp.com",
    projectId: "euphoria-tickets-480c5",
    storageBucket: "euphoria-tickets-480c5.firebasestorage.app",
    messagingSenderId: "633424255364",
    appId: "1:633424255364:web:6dcca65c27d5bb207825d1"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// الدخول
function unlock() {
    if(document.getElementById("adminPass").value === "euphoria+249") {
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("app").style.display = "block";
        initScanner();
    } else { alert("Access Denied!"); }
}

// تحديث الأرشيف والعدادات
db.collection("tickets").orderBy("createdAt", "desc").onSnapshot(snap => {
    const body = document.getElementById("archiveBody");
    let inCount = 0;
    body.innerHTML = "";
    snap.forEach(doc => {
        const d = doc.data();
        if(d.used) inCount++;
        body.innerHTML += `
            <tr class="${d.used ? 'row-in' : ''}">
                <td>${d.name}</td>
                <td>${d.used ? '✅' : '⏳'}</td>
                <td class="action-btns">
                    <button class="mini-btn" onclick="reopen('${doc.id}', '${d.name}')">View</button>
                    <button class="mini-btn btn-danger" onclick="deleteTicket('${doc.id}')">Del</button>
                </td>
            </tr>`;
    });
    document.getElementById("totalCount").innerText = snap.size;
    document.getElementById("inCount").innerText = inCount;
});

// إصدار تذكرة
function issue() {
    const name = document.getElementById("guest").value;
    if(!name) return;
    const id = "EUP-" + Math.random().toString(36).substr(2, 5).toUpperCase();
    db.collection("tickets").doc(id).set({
        name: name,
        used: false,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
    }).then(() => {
        reopen(id, name);
        document.getElementById("guest").value = "";
    });
}

// التحقق من التذكرة (التشك إن)
function verify(id) {
    if(!id) return;
    const cleanID = id.trim().toUpperCase();
    db.collection("tickets").doc(cleanID).get().then(doc => {
        const m = document.getElementById("msg");
        if(!doc.exists) { m.innerText = "❌ INVALID ID"; m.style.color="var(--danger)"; }
        else if(doc.data().used) { m.innerText = "⚠️ ALREADY INSIDE"; m.style.color="orange"; }
        else {
            db.collection("tickets").doc(cleanID).update({ used: true, checkTime: new Date().toLocaleTimeString() });
            m.innerText = "✅ WELCOME: " + doc.data().name; m.style.color="var(--success)";
            document.getElementById("manualID").value = "";
        }
    });
}

// حذف تذكرة
function deleteTicket(id) {
    if(confirm("Delete this ticket permanently?")) {
        db.collection("tickets").doc(id).delete();
    }
}

// فتح التذكرة مرة أخرى
function reopen(id, name) {
    document.getElementById("qrcode").innerHTML = "";
    new QRCode(document.getElementById("qrcode"), { text: id, width: 150, height: 150 });
    document.getElementById("ticket-info").innerText = `TICKET ID: ${id}\nGUEST: ${name.toUpperCase()}\nSTATUS: VERIFIED`;
    document.getElementById("ticket-modal").style.display = "flex";
}

// حفظ كصورة
function saveTicket() {
    html2canvas(document.getElementById("ticket-design")).then(canvas => {
        const link = document.createElement('a');
        link.download = 'Euphoria_Ticket.png';
        link.href = canvas.toDataURL();
        link.click();
    });
}

function initScanner() {
    const scanner = new Html5Qrcode("reader");
    scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 200 }, (id) => verify(id));
}
function closeModal() { document.getElementById("ticket-modal").style.display = "none"; }
</script>
</body>
</html>
