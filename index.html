<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euphoria Elite | Full Management System</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #9d4edd; --bg: #0b0b0f; --card: #16161d; --text: #ffffff; --success: #4ade80; --wa: #25d366; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .container { max-width: 950px; margin: auto; display: none; }
        
        /* UI Components */
        .card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #222; margin-bottom: 20px; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: #222; color: white; box-sizing: border-box; }
        button { background: var(--primary); font-weight: bold; border: none; cursor: pointer; text-transform: uppercase; }
        
        .grid-2 { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; }
        @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }

        /* Tables */
        .table-container { overflow-x: auto; max-height: 300px; overflow-y: auto; border: 1px solid #333; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; background: #111; font-size: 13px; }
        th, td { padding: 12px; border: 1px solid #222; text-align: left; }
        th { background: #1a1a1a; color: var(--primary); sticky: top; }

        /* Ticket Preview */
        #preview-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); z-index: 10000; justify-content: center; align-items: center; flex-direction: column; overflow-y: auto; padding: 20px; }
        #ticket-wrap { background: white; color: black; padding: 20px; border-radius: 15px; width: 300px; text-align: center; border: 3px solid #000; margin-bottom: 15px; }
        
        #login-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .login-box { background: var(--card); padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <img src="https://i.ibb.co/vxWm8J6M/image.png" style="width:70px; border-radius:50%; border:2px solid var(--primary);">
        <h3>EUPHORIA ELITE</h3>
        <input type="password" id="passCode" placeholder="System Password">
        <button onclick="checkAuth()">Login</button>
    </div>
</div>

<div id="preview-overlay">
    <div id="ticket-wrap">
        <h2 style="margin:0; border-bottom: 2px solid #000;">EUPHORIA ELITE</h2>
        <div id="display-qr" style="display:flex; justify-content:center; margin: 15px 0;"></div>
        <div id="display-info" style="font-weight:bold; text-align: left; font-size: 13px; line-height: 1.6; font-family: monospace;"></div>
        <p style="font-size:10px; color:#555; border-top: 1px solid #ddd; margin-top: 10px;">Valid for One Entry Only</p>
    </div>
    <div style="width: 300px; display: flex; flex-direction: column; gap: 8px;">
        <button style="background:black;" onclick="downloadTicket()">📥 Download Image (Gallery)</button>
        <button style="background:var(--wa);" id="waBtn">📱 Send WhatsApp</button>
        <button style="background:#444;" onclick="closePreview()">Close</button>
    </div>
</div>

<div class="container" id="main-app">
    <header style="text-align: center; margin-bottom: 20px;">
        <img src="https://i.ibb.co/vxWm8J6M/image.png" style="width:50px; border-radius:50%;">
        <h2 style="margin:5px 0;">EUPHORIA ELITE PRO</h2>
        <div id="stats" style="font-size: 12px; color: var(--success);">Loading Stats...</div>
    </header>

    <div class="grid-2">
        <div>
            <div class="card">
                <h3 style="margin-top:0">🎫 Issue Ticket</h3>
                <input type="text" id="gName" placeholder="Guest Name">
                <select id="eType"><option>VIP Access 💎</option><option>Regular Access</option></select>
                <button onclick="createTicket()">Generate Ticket</button>
            </div>

            <div class="card">
                <h3>📋 All Issued Tickets</h3>
                <div class="table-container">
                    <table>
                        <thead><tr><th>ID</th><th>Guest</th><th>Status</th><th>Action</th></tr></thead>
                        <tbody id="allTickets"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div>
            <div class="card" style="border: 1px solid var(--primary);">
                <h3 style="margin-top:0; color:var(--primary)">🛡️ ENTRY CHECK-IN</h3>
                <div id="reader" style="border-radius:10px; overflow:hidden; background: #000; margin-bottom: 10px;"></div>
                <input type="text" id="manualInput" placeholder="Enter ID (e.g. EUP-ABC)">
                <button onclick="verifyEntry(document.getElementById('manualInput').value)" style="background:var(--success); color:#000;">Verify Guest</button>
                <div id="scanMsg" style="text-align:center; font-weight:bold; margin-top:10px;"></div>
            </div>

            <div class="card" style="border: 1px solid var(--success);">
                <h3 style="margin-top:0; color:var(--success)">✅ SCANNED / INSIDE</h3>
                <div class="table-container">
                    <table>
                        <thead><tr><th>ID</th><th>Guest Name</th><th>Time</th></tr></thead>
                        <tbody id="scannedLog"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDbla1Ok8aSs2IUUeB6v-2tRriNPWmYTvE",
    authDomain: "euphoria-tickets-480c5.firebaseapp.com",
    projectId: "euphoria-tickets-480c5",
    storageBucket: "euphoria-tickets-480c5.firebasestorage.app",
    messagingSenderId: "633424255364",
    appId: "1:633424255364:web:6dcca65c27d5bb207825d1"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function checkAuth() {
    if(document.getElementById("passCode").value === "euphoria+249") {
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("main-app").style.display = "block";
        initScanner();
    } else { alert("Incorrect Password"); }
}

// Real-time Data Sync (All & Scanned)
db.collection("tickets").orderBy("dateIssued", "desc").onSnapshot(snap => {
    const allT = document.getElementById("allTickets");
    const scanT = document.getElementById("scannedLog");
    allT.innerHTML = ""; scanT.innerHTML = "";
    let insideCount = 0;

    snap.forEach(doc => {
        const d = doc.data(); const id = doc.id;
        const status = d.used ? `<span style="color:var(--success)">Inside</span>` : `<span>Waiting</span>`;
        
        allT.innerHTML += `<tr><td>${id}</td><td>${d.name}</td><td>${status}</td><td><button onclick="reprint('${id}','${d.name}','${d.type}')" style="padding:4px; font-size:9px;">View</button></td></tr>`;
        
        if(d.used) {
            insideCount++;
            scanT.innerHTML += `<tr><td>${id}</td><td>${d.name}</td><td>${d.checkTime || '--'}</td></tr>`;
        }
    });
    document.getElementById("stats").innerText = `Total: ${snap.size} | Inside: ${insideCount}`;
});

function createTicket() {
    const name = document.getElementById("gName").value;
    const type = document.getElementById("eType").value;
    if(!name) return alert("Enter Name");
    const id = "EUP-" + Math.random().toString(36).substr(2, 5).toUpperCase();
    db.collection("tickets").doc(id).set({ name, type, used: false, dateIssued: firebase.firestore.FieldValue.serverTimestamp() }).then(() => {
        reprint(id, name, type);
        document.getElementById("gName").value = "";
    });
}

function reprint(id, name, type) {
    document.getElementById("display-qr").innerHTML = "";
    new QRCode(document.getElementById("display-qr"), { text: id, width: 160, height: 160 });
    document.getElementById("display-info").innerText = `ID: ${id}\nGUEST: ${name.toUpperCase()}\nACCESS: ${type}`;
    
    const waMsg = `*EUPHORIA ELITE*%0A*ID:* ${id}%0A*Guest:* ${name}%0A*Access:* ${type}`;
    document.getElementById("waBtn").onclick = () => window.open(`https://wa.me/?text=${waMsg}`, '_blank');
    
    document.getElementById("preview-overlay").style.display = "flex";
}

function downloadTicket() {
    html2canvas(document.getElementById("ticket-wrap")).then(canvas => {
        const link = document.createElement('a');
        link.download = 'Ticket.png';
        link.href = canvas.toDataURL();
        link.click();
    });
}

function verifyEntry(id) {
    if(!id) return;
    const msg = document.getElementById("scanMsg");
    db.collection("tickets").doc(id.trim().toUpperCase()).get().then(doc => {
        if(!doc.exists) { msg.innerHTML = "❌ INVALID ID"; msg.style.color = "red"; }
        else if(doc.data().used) { msg.innerHTML = "⚠️ ALREADY SCANNED"; msg.style.color = "orange"; }
        else {
            db.collection("tickets").doc(id.trim().toUpperCase()).update({ used: true, checkTime: new Date().toLocaleTimeString() });
            msg.innerHTML = "✅ GRANTED: " + doc.data().name; msg.style.color = var(--success);
            document.getElementById("manualInput").value = "";
        }
    });
}

function closePreview() { document.getElementById("preview-overlay").style.display = "none"; }
function initScanner() { const sc = new Html5Qrcode("reader"); sc.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (id) => verifyEntry(id)); }
</script>
</body>
</html>
