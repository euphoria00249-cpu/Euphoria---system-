<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euphoria Tickets</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; background: #0b0b0f; color: white; text-align: center; padding: 20px; }
        .card { background: #16161d; padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; border: 1px solid #333; }
        input, select, button { margin: 10px 0; padding: 15px; width: 100%; border-radius: 10px; border: none; font-size: 16px; box-sizing: border-box; }
        button { background: #7b2cbf; color: white; font-weight: bold; cursor: pointer; }
        #qrcode-container { background: white; padding: 20px; margin-top: 20px; display: none; border-radius: 10px; color: black; }
        #qrcode { display: flex; justify-content: center; margin-bottom: 10px; }
        #reader { width: 100%; border-radius: 10px; margin-top: 15px; background: #222; }
    </style>
</head>
<body>
    <h2>Euphoria Tickets 🎟️</h2>
    <div id="loginSection" class="card">
        <input type="password" id="passInput" placeholder="أدخل كلمة المرور">
        <button onclick="checkLogin()">دخول</button>
    </div>

    <div id="appSection" style="display:none;" class="card">
        <h3>إصدار تذكرة</h3>
        <input id="userName" placeholder="اسم الزبون">
        <select id="ticketType"><option>Regular</option><option>VIP</option></select>
        <button onclick="generateTicket()">توليد QR Code</button>
        <div id="qrcode-container">
            <div id="qrcode"></div>
            <p id="ticketDetails" style="font-weight:bold;"></p>
            <button onclick="window.print()" style="background: #2d6a4f">حفظ / طباعة</button>
        </div>
        <hr style="margin:20px 0; border:0.1px solid #333;">
        <h3>ماسح التذاكر</h3>
        <div id="reader"></div>
    </div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDbla1Ok8aSs2IUUeB6v-2tRriNPWmYTvE",
    authDomain: "euphoria-tickets-480c5.firebaseapp.com",
    projectId: "euphoria-tickets-480c5",
    storageBucket: "euphoria-tickets-480c5.firebasestorage.app",
    messagingSenderId: "633424255364",
    appId: "1:633424255364:web:6dcca65c27d5bb207825d1"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function checkLogin() {
    const pass = document.getElementById("passInput").value;
    if(pass === "euphoria+249") {
        document.getElementById("loginSection").style.display = "none";
        document.getElementById("appSection").style.display = "block";
        startScanner();
    } else {
        alert("كلمة المرور غير صحيحة!");
    }
}

function generateTicket() {
    let name = document.getElementById("userName").value;
    let type = document.getElementById("ticketType").value;
    if(!name) return alert("يرجى كتابة اسم الزبون");
    let id = "EUP-" + Date.now();
    db.collection("tickets").doc(id).set({ name, type, used: false }).then(() => {
        document.getElementById("qrcode").innerHTML = "";
        new QRCode(document.getElementById("qrcode"), id);
        document.getElementById("ticketDetails").innerText = name + " (" + type + ")";
        document.getElementById("qrcode-container").style.display = "block";
    });
}

function startScanner() {
    const scanner = new Html5Qrcode("reader");
    scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (decodedText) => {
        db.collection("tickets").doc(decodedText).get().then(doc => {
            if(!doc.exists) alert("❌ تذكرة غير موجودة!");
            else if(doc.data().used) alert("⚠️ مستخدمة مسبقاً لـ: " + doc.data().name);
            else {
                db.collection("tickets").doc(decodedText).update({used: true});
                alert("✅ تذكرة صالحة! أهلاً بك " + doc.data().name);
            }
        });
    }).catch(err => console.log("انتظر إذن الكاميرا"));
}
</script>
</body>
</html>
